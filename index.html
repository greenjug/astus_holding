<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astus — Coming Soon</title>
  <meta name="description" content="Exciting things are on the way from Astus.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page">
    <div class="content">
      <section class="intro" aria-labelledby="heading">
        <h1 id="heading">COMING SOON.</h1>
        <p class="tagline">Exciting things are on the way!</p>
        <a class="email" href="mailto:LetsTalk@helloastus.co.uk">LetsTalk@helloastus.co.uk</a>
      </section>

      <section class="countdown" aria-label="Launch countdown">
        <div class="countdown__units" id="countdown">
          <div class="countdown__unit">
            <span class="countdown__value" id="days">00</span>
            <span class="countdown__label">Days</span>
          </div>
          <span class="countdown__separator" aria-hidden="true">:</span>
          <div class="countdown__unit">
            <span class="countdown__value" id="hours">00</span>
            <span class="countdown__label">Hours</span>
          </div>
          <span class="countdown__separator" aria-hidden="true">:</span>
          <div class="countdown__unit">
            <span class="countdown__value" id="minutes">00</span>
            <span class="countdown__label">Min</span>
          </div>
          <span class="countdown__separator" aria-hidden="true">:</span>
          <div class="countdown__unit">
            <span class="countdown__value" id="seconds">00</span>
            <span class="countdown__label">Sec</span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="js/countdown.js"></script>
</body>
</html>
